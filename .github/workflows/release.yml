name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        uses: crazy-max/ghaction-xgo@v3
        with:
          xgo_version: v0.36.0
          go_version: 1.25
          dest: dist
          pkg: ./cmd/witc
          output: witc
          buildmode: exe
          targets: linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64
          x_cgo: 1
          ldflags: "-s -w"

      - name: Package artifacts
        run: |
          for target in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64 windows-amd64; do
            os="${target%%-*}"
            arch="${target##*-}"
            BIN="witc-${{ steps.version.outputs.tag }}-${os}-${arch}"
            if [ "$os" = "windows" ]; then
              cp "dist/${target}/witc.exe" "${BIN}.exe"
              zip "${BIN}.zip" "${BIN}.exe"
              rm "${BIN}.exe"
            else
              cp "dist/${target}/witc" "${BIN}"
              chmod +x "${BIN}"
              tar czf "${BIN}.tar.gz" "${BIN}"
              rm "${BIN}"
            fi
          done
          ls -la witc-*.zip witc-*.tar.gz

      - name: SHA256 checksums
        run: |
          sha256sum witc-*.zip witc-*.tar.gz > dist/checksums.sha256
          cat dist/checksums.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            witc-*.zip
            witc-*.tar.gz
            dist/checksums.sha256
